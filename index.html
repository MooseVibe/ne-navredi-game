<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>НЕ НАВРЕДИ — симулятор ночной аптеки</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="not-started">
  <main class="game">
    <section class="intro" id="intro">
      <div class="intro-card">
        <span class="intro-cross">+</span>
        <small>СИМУЛЯТОР НОЧНОЙ АПТЕКИ</small>
        <h1>НЕ<br>НАВРЕДИ</h1>
        <p>Шесть посетителей. Одна лицензия.<br>И ни одного простого решения.</p>
        <button id="start">НАЧАТЬ СМЕНУ <b>→</b></button>
        <i>НАДЕНЬТЕ НАУШНИКИ</i>
      </div>
    </section>
    <header class="topbar">
      <div class="brand"><span class="cross">+</span><span><b>НЕ НАВРЕДИ</b><small>АПТЕКА · НОЧНАЯ СМЕНА</small></span></div>
      <div class="shift"><span>СМЕНА</span><b id="progress">01 / 06</b><i><em id="progressBar"></em></i></div>
      <button class="sound" id="sound" aria-label="Включить или выключить звук">ЗВУК: ВКЛ</button>
    </header>

    <section class="scene" id="scene">
      <div class="ceiling"><i></i><i></i><i></i></div>
      <aside class="shelf left"><div></div><div></div><div></div></aside>
      <aside class="shelf right"><div></div><div></div><div></div></aside>
      <div class="door"><span>24/7</span><small>ОТКРЫТО</small></div>
      <div class="queue" id="queue"></div>
      <div class="customer" id="customer" aria-live="polite">
        <div class="head"><span class="hair"></span><span class="face"><i class="eye one"></i><i class="eye two"></i><i class="nose"></i><i class="mouth"></i></span></div>
        <div class="body"><span id="badge"></span></div>
      </div>
      <div class="counter"><span class="scanner"></span><span class="receipt"></span><span class="hands"></span></div>
      <div class="atmosphere"></div>
    </section>

    <section class="hud">
      <div class="case"><div class="case-head"><span id="caseTag">ПОСЕТИТЕЛЬ #01</span><b id="name">ИГОРЬ, 34</b><small id="mood">НЕРВНИЧАЕТ</small><button class="voice" id="voice" aria-label="Повторить реплику">▶ ГОЛОС</button></div><blockquote id="line"></blockquote></div>
      <div class="choices" id="choices"></div>
      <div class="stats">
        <div><span>КАССА</span><b id="money">₽ 0</b></div>
        <div><span>ДОВЕРИЕ</span><b id="trust">50</b></div>
        <div><span>РИСК</span><b id="risk">0</b></div>
      </div>
    </section>

    <div class="result" id="result" hidden>
      <p id="resultText"></p><button id="next">СЛЕДУЮЩИЙ ПОСЕТИТЕЛЬ →</button>
    </div>
    <div class="ending" id="ending" hidden><div><small>СМЕНА ОКОНЧЕНА</small><h1 id="endingTitle"></h1><p id="endingText"></p><button id="restart">ЕЩЁ ОДНА СМЕНА</button></div></div>
  </main>
  <audio id="speech" preload="auto"></audio>
  <script src="app.js"></script>
</body>
</html>
